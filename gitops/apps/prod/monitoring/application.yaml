apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agrivo-monitoring-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/MaryamJabrailova04/Agrivo.git
    targetRevision: main
    path: k8s/helm/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
