apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agrivo-ingress-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/MaryamJabrailova04/Agrivo.git
    targetRevision: main
    path: k8s/helm/ingress
    helm:
      valueFiles:
        - values/prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
