{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agrivo-backend-keyvault
spec:
  provider: azure
  secretObjects:
    - secretName: agrivo-backend-secret
      type: Opaque
      data:
{{- range .Values.keyVault.secrets }}
        - objectName: {{ .objectName }}
          key: {{ .envName }}
{{- end }}
  parameters:
    usePodIdentity: {{ .Values.keyVault.usePodIdentity | quote }}
    useVMManagedIdentity: {{ .Values.keyVault.useVMManagedIdentity | quote }}
    userAssignedIdentityID: {{ .Values.keyVault.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
{{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
{{- end }}
{{- end }}
