replicaCount: 1

image:
  repository: ghcr.io/maryamjabrailova04/agrivo-backend
  tag: "b3b0f7602e7ff1cb135e33953004a527959a37c4"
  pullPolicy: IfNotPresent

config:
  nodeEnv: production
  port: "5000"
  jwtExpiresIn: 7d
  frontendUrl: https://dev.agrivo.example.com

secret:
  databaseUrl: postgresql://postgres:password@postgres:5432/agrivo_db?schema=public
  jwtSecret: dev-placeholder-replace-with-key-vault

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

keyVault:
  enabled: true
  name: kv-agrivo-dev-566422
  tenantId: "cdfc3bf8-f209-418a-8563-7f864d83f183"
  clientId: "451ff70e-448d-4bef-94c6-9ebc838b8784"
  usePodIdentity: "false"
  useVMManagedIdentity: "true"
  secrets:
    - objectName: DATABASE-URL
      objectType: secret
      envName: DATABASE_URL
    - objectName: JWT-SECRET
      objectType: secret
      envName: JWT_SECRET

monitoring:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  labels:
    release: kube-prometheus-stack
  alerts:
    enabled: true
  
