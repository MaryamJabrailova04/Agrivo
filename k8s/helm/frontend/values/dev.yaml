replicaCount: 1

image:
  repository: 20.255.57.122/agrivo/frontend
  tag: "e3f0460764c0741b6598313a8bdd6e6a1333e117"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: dev.agrivo.example.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  tls:
    enabled: true
    secretName: agrivo-frontend-dev-tls
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
