name: Bootstrap AKS Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [dev, prod]

concurrency:
  group: platform-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/use-kubelogin@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          kubelogin-version: v0.2.17
      - uses: azure/setup-helm@v4
      - name: Connect to AKS
        run: az aks get-credentials -g "${{ vars.AKS_RESOURCE_GROUP }}" -n "${{ vars.AKS_CLUSTER_NAME }}" --overwrite-existing
      - name: Install and upgrade platform controllers
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add jetstack https://charts.jetstack.io
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install argocd argo/argo-cd -n argocd --create-namespace --wait --timeout 15m
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace --wait --timeout 15m
          # AKS admissionsenforcer owns part of the webhook namespaceSelector.
          # Client-side apply preserves that mutation and avoids Helm 4 SSA
          # field-manager conflicts on repeatable bootstrap runs.
          helm upgrade --install cert-manager jetstack/cert-manager -n cert-manager --create-namespace --set crds.enabled=true --server-side=false --wait --timeout 15m
          # Monitoring runs on every node. Do not block the core platform when
          # an autoscaled node is still joining; Helm/Kubernetes will converge.
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack -n monitoring --create-namespace --wait=false
      - name: Bootstrap Argo CD app-of-apps
        run: kubectl apply -f "gitops/argocd/root-app-${{ inputs.environment }}.yaml"
      - name: Verify application rollout
        run: |
          NAMESPACE="agrivo-${{ inputs.environment }}"
          for i in {1..60}; do
            kubectl -n argocd get application "agrivo-backend-${{ inputs.environment }}" >/dev/null 2>&1 && \
            kubectl -n argocd get application "agrivo-frontend-${{ inputs.environment }}" >/dev/null 2>&1 && break
            sleep 5
          done
          kubectl -n argocd get applications
          kubectl -n "$NAMESPACE" rollout status deployment/agrivo-backend --timeout=10m
          kubectl -n "$NAMESPACE" rollout status deployment/agrivo-frontend --timeout=10m
          kubectl -n "$NAMESPACE" get pods,services,ingress
      - name: Verify platform
        run: |
          kubectl -n argocd rollout status deployment/argocd-server --timeout=10m
          kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=10m
          kubectl -n cert-manager rollout status deployment/cert-manager --timeout=10m
          kubectl get applications -n argocd
          kubectl get nodes
