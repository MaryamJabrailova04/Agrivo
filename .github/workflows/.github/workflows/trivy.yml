name: Trivy Security Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -t agrivo-frontend:latest \
            ./frontend

      - name: Run Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: agrivo-frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif

      - name: Upload Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-report
          path: trivy-frontend.sarif

  trivy-backend:
    name: Scan Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
            -t agrivo-backend:latest \
            ./backend

      - name: Run Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: agrivo-backend:latest
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Backend SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

      - name: Upload Backend Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-report
          path: trivy-backend.sarif
