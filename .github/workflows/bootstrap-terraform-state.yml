name: Bootstrap Terraform State

on:
  workflow_dispatch:

concurrency:
  group: terraform-state-bootstrap
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Validate configuration
        env:
          RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
          STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          test -n "$RESOURCE_GROUP"
          test -n "$STORAGE_ACCOUNT"
          test -n "$CONTAINER"
          test -n "$LOCATION"
          [[ "$STORAGE_ACCOUNT" =~ ^[a-z0-9]{3,24}$ ]]

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create encrypted remote-state storage idempotently
        env:
          RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
          STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none
          if ! az storage account show --resource-group "$RESOURCE_GROUP" --name "$STORAGE_ACCOUNT" >/dev/null 2>&1; then
            az storage account create \
              --resource-group "$RESOURCE_GROUP" \
              --name "$STORAGE_ACCOUNT" \
              --location "$LOCATION" \
              --sku Standard_LRS \
              --kind StorageV2 \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false \
              --output none
          fi
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "$RESOURCE_GROUP" \
            --account-name "$STORAGE_ACCOUNT" \
            --query '[0].value' -o tsv)
          az storage container create \
            --name "$CONTAINER" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --public-access off \
            --output none
          echo "Terraform state storage is ready."
