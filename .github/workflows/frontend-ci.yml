name: Frontend CI

on:
  push:
    branches:
      - main
      - devops/**
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

env:
  IMAGE_NAME: frontend
  HARBOR_CONFIGURED: ${{ secrets.HARBOR_REGISTRY != '' && secrets.HARBOR_PROJECT != '' && secrets.HARBOR_USERNAME != '' && secrets.HARBOR_PASSWORD != '' }}

jobs:
  build:
    name: Build, scan, and publish frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run npm audit
        working-directory: frontend
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Set image tag
        id: image
        run: |
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f frontend/Dockerfile \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_DATA_MODE=api \
            -t "agrivo-frontend:${GITHUB_SHA}" \
            .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agrivo-frontend:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Login to Harbor
        if: github.event_name != 'pull_request' && env.HARBOR_CONFIGURED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Push Docker image to Harbor
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.image.outputs.image }}"
      - name: Update dev Helm image tag
        if: github.event_name != 'pull_request'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("k8s/helm/frontend/values/dev.yaml")
          text = path.read_text()

          lines = text.splitlines()
          updated = []
          in_image_block = False

          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image_block = True
                  updated.append(line)
                  continue

              if in_image_block and stripped.startswith("tag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f'{indent}tag: "{__import__("os").environ["GITHUB_SHA"]}"')
                  in_image_block = False
                  continue

              updated.append(line)

          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit frontend GitOps tag update
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/frontend/values/dev.yaml
          git commit -m "Update frontend dev image tag to ${GITHUB_SHA}" || echo "No frontend image tag changes to commit"
          git push
