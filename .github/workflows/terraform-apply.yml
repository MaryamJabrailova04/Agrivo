name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment to apply"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write
  id-token: write

jobs:
  apply:
    name: Terraform apply
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_admin_object_id: ${{ vars.AZURE_ADMIN_OBJECT_ID }}
      TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
      ENVIRONMENT: ${{ github.event.inputs.environment }}

    defaults:
      run:
        working-directory: infra/environments/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load non-secret environment defaults
        run: cp terraform.tfvars.example terraform.tfvars

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${ENVIRONMENT}.terraform.tfstate"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

      - name: Export infrastructure identity into Helm values
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          SITE_HOSTNAME: ${{ vars.SITE_HOSTNAME }}
          LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
        run: |
          CLIENT_ID=$(terraform output -raw key_vault_csi_client_id)
          KEY_VAULT=$(terraform output -raw key_vault_name)
          BACKEND_FILE="../../../k8s/helm/backend/values/${ENVIRONMENT}.yaml"
          FRONTEND_FILE="../../../k8s/helm/frontend/values/${ENVIRONMENT}.yaml"
          INGRESS_FILE="../../../k8s/helm/ingress/values/${ENVIRONMENT}.yaml"
          sed -i -E "s|^  name: .*|  name: ${KEY_VAULT}|" "$BACKEND_FILE"
          sed -i -E "s|^  tenantId: .*|  tenantId: \"${TF_VAR_tenant_id}\"|" "$BACKEND_FILE"
          sed -i -E "s|^  clientId: .*|  clientId: \"${CLIENT_ID}\"|" "$BACKEND_FILE"
          if [ -n "$SITE_HOSTNAME" ]; then
            sed -i -E "s|^  frontendUrl: .*|  frontendUrl: https://${SITE_HOSTNAME}|" "$BACKEND_FILE"
            sed -i -E "s|^  host: .*|  host: ${SITE_HOSTNAME}|" "$FRONTEND_FILE"
          else
            echo "SITE_HOSTNAME is not set; preserving the current GitOps hostname."
          fi
          if [ -n "$LETSENCRYPT_EMAIL" ]; then
            sed -i -E "s|^  email: .*|  email: ${LETSENCRYPT_EMAIL}|" "$INGRESS_FILE"
          else
            echo "LETSENCRYPT_EMAIL is not set; preserving the current issuer email."
          fi

      - name: Commit generated GitOps identity configuration
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gitops): sync ${{ github.event.inputs.environment }} infrastructure outputs [skip ci]"
          file_pattern: k8s/helm/*/values/${{ github.event.inputs.environment }}.yaml
