name: Promote Image To Production

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to promote"
        required: true
        type: choice
        options:
          - frontend
          - backend
      image_tag:
        description: "Immutable image tag to promote, usually a Git SHA"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    name: Promote image to production
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate component
        run: |
          if [ "${{ github.event.inputs.component }}" != "frontend" ] && [ "${{ github.event.inputs.component }}" != "backend" ]; then
            echo "Invalid component"
            exit 1
          fi

      - name: Update production Helm image tag
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          FILE="k8s/helm/${COMPONENT}/values/prod.yaml"

          python3 - <<'PY'
          import os
          from pathlib import Path

          component = os.environ["COMPONENT"]
          image_tag = os.environ["IMAGE_TAG"]
          path = Path(os.environ["FILE"])

          text = path.read_text()
          lines = text.splitlines()
          updated = []
          in_image_block = False
          changed = False

          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image_block = True
                  updated.append(line)
                  continue

              if in_image_block and stripped.startswith("tag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f'{indent}tag: "{image_tag}"')
                  in_image_block = False
                  changed = True
                  continue

              updated.append(line)

          if not changed:
              raise SystemExit(f"Could not find image.tag in {path}")

          path.write_text("\n".join(updated) + "\n")
          print(f"Updated {component} production image tag to {image_tag}")
          PY

      - name: Commit production promotion
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "k8s/helm/${COMPONENT}/values/prod.yaml"
          git commit -m "Promote ${COMPONENT} image ${IMAGE_TAG} to production" || echo "No production image tag changes to commit"
          git push
