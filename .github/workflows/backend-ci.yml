name: Backend CI

on:
  push:
    branches:
      - main
      - devops/**
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

env:
  IMAGE_NAME: backend
  LOCAL_IMAGE: agrivo-backend:${{ github.sha }}

jobs:
  build:
    name: Build, test, scan, and publish backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agrivo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agrivo_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/agrivo_db?schema=public
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run prisma:migrate

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Start backend health smoke test
        working-directory: backend
        run: |
          npm start &
          sleep 10
          curl --fail http://localhost:5000/api/health
          curl --fail http://localhost:5000/api/health/live
          curl --fail http://localhost:5000/api/health/ready
          curl --fail http://localhost:5000/api/metrics

      - name: Set image tag
        id: image
        run: |
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "$LOCAL_IMAGE" \
            .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.LOCAL_IMAGE }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
     
      - name: Configure insecure Harbor registry
        if: github.event_name != 'pull_request' && vars.HARBOR_INSECURE == 'true'
        run: |
          echo '{ "insecure-registries": ["${{ secrets.HARBOR_REGISTRY }}"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Tag Docker image for Harbor
        if: github.event_name != 'pull_request'
        run: docker tag "$LOCAL_IMAGE" "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}"


      - name: Push Docker image to Harbor
        if: github.event_name != 'pull_request'
        run: docker push "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}"
      - name: Update dev Helm image tag
        if: github.event_name != 'pull_request'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("k8s/helm/backend/values/dev.yaml")
          text = path.read_text()

          lines = text.splitlines()
          updated = []
          in_image_block = False

          for line in lines:
              stripped = line.strip()

              if stripped == "image:":
                  in_image_block = True
                  updated.append(line)
                  continue

              if in_image_block and stripped.startswith("tag:"):
                  indent = line[: len(line) - len(line.lstrip())]
                  updated.append(f'{indent}tag: "{__import__("os").environ["GITHUB_SHA"]}"')
                  in_image_block = False
                  continue

              updated.append(line)

          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit backend GitOps tag update
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/helm/backend/values/dev.yaml
          git commit -m "Update backend dev image tag to ${GITHUB_SHA}" || echo "No backend image tag changes to commit"
          git push
