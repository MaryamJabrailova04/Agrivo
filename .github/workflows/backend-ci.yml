name: Backend CI

on:
  push:
    branches:
      - main
      - devops/**
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: backend

jobs:
  build:
    name: Build, test, scan, and publish backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agrivo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agrivo_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/agrivo_db?schema=public
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Apply database migrations
        working-directory: backend
        run: npm run prisma:migrate

      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Start backend health smoke test
        working-directory: backend
        run: |
          npm start &
          sleep 10
          curl --fail http://localhost:5000/api/health
          curl --fail http://localhost:5000/api/health/live
          curl --fail http://localhost:5000/api/health/ready
          curl --fail http://localhost:5000/api/metrics

      - name: Set image tag
        id: image
        run: |
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "${{ steps.image.outputs.image }}" \
            .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Login to Harbor
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Push Docker image to Harbor
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.image.outputs.image }}"
